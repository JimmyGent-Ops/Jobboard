<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Melissa – Field Ops Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.9);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --pill-bg: rgba(56, 189, 248, 0.15);
      --pill-text: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }
    .timestamp {
      color: var(--muted);
      font-size: 1rem;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 15px 50px rgba(2, 6, 23, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.25);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .pill {
      background: var(--pill-bg);
      color: var(--pill-text);
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .notes {
      line-height: 1.5;
      font-size: 0.95rem;
      color: #f8fafc;
    }
    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Melissa – Field Ops · Tue, Mar 10</h1>
    <span class="timestamp">Updated 10:20 PM PT</span>
  </header>

  <section class="board" id="board"></section>

  <footer>
    Pulls from today’s task list. Ping Elliot when something changes.
  </footer>

  <script>
    const tasks = [
      {
        title: 'Mt. Whitney Tow Notice Posting',
        status: 'Complete - archived',
        notes: 'Vehicle cleared 3/24 at 08:44 AM PT; posting proof, timestamp, and tow confirmation are filed.'
      },
      {
        title: '852 Roundhouse – Running Toilet',
        status: 'Scheduling',
        notes: 'Coordinate the Fidelity warranty call, lock the appointment, then confirm with the tenant.'
      },
      {
        title: 'Mariner Cove Rent-Ready Walk',
        status: 'Today',
        notes: 'Bring light cleaning supplies, verify detectors/cabinets, document any issues for Jimmy.'
      },
      {
        title: '1025 Tyler – Help Dave move',
        status: 'Need schedule',
        notes: 'Coordinate with Dave on timing/access/checklist for the move assist.'
      }
    ];

    const board = document.getElementById('board');
    tasks.forEach(task => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="meta">
          <span>Melissa</span>
          <span class="pill">${task.status}</span>
        </div>
        <h2>${task.title}</h2>
        <p class="notes">${task.notes}</p>
      `;
      board.appendChild(card);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Field Ops Board — Melissa & Jon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.9);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --pill-bg: rgba(56, 189, 248, 0.15);
      --pill-text: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }
    .timestamp {
      color: var(--muted);
      font-size: 1rem;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 15px 50px rgba(2, 6, 23, 0.8);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .pill {
      background: var(--pill-bg);
      color: var(--pill-text);
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .notes {
      line-height: 1.5;
      font-size: 0.95rem;
      color: #f8fafc;
    }
    footer {
      margin-top: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Field Ops · Thu, Mar 5</h1>
    <span class="timestamp">Updated 10:38 AM PT</span>
  </header>

  <section class="board" id="board"></section>

  <footer>
    This board mirrors the Melissa + Jon cards from the main site.
  </footer>

  <script>
    const fieldTasks = [
      {
        owner: 'Melissa',
        title: 'Mt. Whitney Tow Notice Posting',
        status: 'Proof pending',
        notes: 'Send timestamp + photos so the 72-hour tow clock can start.'
      },
      {
        owner: 'Melissa',
        title: '852 Roundhouse — Running Toilet',
        status: 'Scheduling',
        notes: 'Book through Fidelity warranty line. Need window + tenant confirmation.'
      },
      {
        owner: 'Jon',
        title: 'Mt. Whitney Vehicle Photos + VIN',
        status: 'Queued',
        notes: 'Grab full photo set and VIN once we have tenant + vehicle details from Sandy.'
      },
      {
        owner: 'Jon',
        title: 'Groom Door — Pull & Deliver',
        status: 'Stand by',
        notes: 'Coordinate with Jimmy for timing, then drop frame with shop for rebuild.'
      }
    ];

    const board = document.getElementById('board');
    fieldTasks.forEach(task => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="meta">
          <span>${task.owner}</span>
          <span class="pill">${task.status}</span>
        </div>
        <h2>${task.title}</h2>
        <p class="notes">${task.notes}</p>
      `;
      board.appendChild(card);
    });
  </script>
</body>
</html>

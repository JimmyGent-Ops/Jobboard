<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jon – Field Ops Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.92);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #fbbf24;
      --pill-bg: rgba(251, 191, 36, 0.18);
      --pill-text: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0b1220 0%, #020617 70%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }
    .timestamp {
      color: var(--muted);
      font-size: 1rem;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 15px 50px rgba(2, 6, 23, 0.85);
      border: 1px solid rgba(251, 191, 36, 0.25);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .pill {
      background: var(--pill-bg);
      color: var(--pill-text);
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .notes {
      line-height: 1.5;
      font-size: 0.95rem;
      color: #f8fafc;
    }
    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Jon – Field Ops · Fri, Mar 6</h1>
    <span class="timestamp">Updated 9:50 AM PT</span>
  </header>

  <section class="board" id="board"></section>

  <footer>
    Pulls from today’s task list. Ping Elliot when something changes.
  </footer>

  <script>
    const tasks = [
      {
        title: 'Largomarcino Garage Remote + Keys',
        status: 'In progress',
        notes: 'Program the garage-door remote, confirm operation, and cut/deliver the new move-in key set.'
      },
      {
        title: '4606 Neil Exterior Photos',
        status: 'Shared with Melissa',
        notes: 'Capture exterior/storage views to spot HOA violations. Send photos + notes to Sandy & Jimmy for next steps.'
      }
    ];

    const board = document.getElementById('board');
    tasks.forEach(task => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="meta">
          <span>Jon</span>
          <span class="pill">${task.status}</span>
        </div>
        <h2>${task.title}</h2>
        <p class="notes">${task.notes}</p>
      `;
      board.appendChild(card);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jimmy Ops Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f4f6;
      --card: #fff;
      --text: #1f2933;
      --muted: #4b5563;
      --accent: #2563eb;
      --pill-bg: #e0e7ff;
      --pill-text: #1e3a8a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }
    .timestamp {
      color: var(--muted);
      font-size: 0.95rem;
    }
    #board {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .person {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    }
    .person.highlight {
      border: 2px solid var(--accent);
      box-shadow: 0 16px 45px rgba(37, 99, 235, 0.18);
    }
    .person-header {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .person-header h2 {
      margin: 0;
      font-size: 1.25rem;
    }
    .role {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.04);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .pill {
      background: var(--pill-bg);
      color: var(--pill-text);
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .notes {
      line-height: 1.4;
      font-size: 0.95rem;
    }
    footer {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ops Board · Fri, Mar 6</h1>
    <span class="timestamp">Updated 9:25 AM PT</span>
  </header>

  <section id="board"></section>

  <footer>
    View-only for now. Send updates via email/SMS and Elliot will refresh the board.
  </footer>

  <script>
    const sections = [
      {
        owner: 'Melissa',
        role: 'Field lead',
        tasks: [
          {
            title: 'Mariner Cove Rent-Ready Check',
            status: 'Today',
            notes: 'Bring water, run the smoke-detector test, confirm the unit is clean, empty, and cabinets are cleared before marketing.'
          },
          {
            title: 'Largomarcino Move-In Photos',
            status: 'On deck',
            notes: 'Full photo set as soon as John wraps the garage door/keys; drop the files into AI_Operations ▸ Properties ▸ Largomarcino.'
          },
          {
            title: '4606 Neil Photo Set',
            status: 'Shared with Jon',
            notes: 'Coordinate to capture marketing-quality shots once the storage situation is confirmed.'
          }
        ]
      },
      {
        owner: 'Jon',
        role: 'Field tech',
        tasks: [
          {
            title: 'Largomarcino Garage Door + Keys',
            status: 'In progress',
            notes: 'Repair the door hardware, confirm smooth operation, then cut/deliver the new key set for move-in.'
          },
          {
            title: '4606 Neil Photo Backup',
            status: 'Ready',
            notes: 'Support Melissa on the photo run and document exterior storage if available.'
          }
        ]
      },
      {
        owner: 'Sandy',
        role: 'PM lead',
        tasks: [
          {
            title: 'Mariner Cove Tenant Selection',
            status: 'With Jimmy',
            notes: 'Review applications today and pick the tenant once the rent-ready check clears.'
          },
          {
            title: '4606 Neil – Exterior Storage',
            status: 'Coordinate',
            notes: 'Confirm whether a storage space exists on-site and report back so we can brief prospects.'
          },
          {
            title: 'American Leak Detection – 852 Roundhouse',
            status: 'Tue 3/10 · 8 AM',
            notes: 'Be onsite and keep the downstairs neighbor informed once the tech arrives.'
          },
          {
            title: 'Jet Plumbing – 7541 Cumberland',
            status: 'Mon 3/9 · 12–2 PM',
            notes: 'Confirm tenant access and text Elliot when the window is locked in.'
          }
        ]
      },
      {
        owner: 'Jimmy',
        role: 'Director',
        tasks: [
          {
            title: 'Halladale Net Sheets',
            status: 'Today',
            notes: 'Prep the $399k / $395k / $385k versions for Connie Sutton and hand-deliver them today.'
          },
          {
            title: 'Copperwood MLS Launch',
            status: 'Needs scheduling',
            notes: 'Load the listing, coordinate marketing photos, and make sure copy + measurements are current.'
          },
          {
            title: 'Mariner Cove Tenant Selection',
            status: 'With Sandy',
            notes: 'Joint decision once the rent-ready walkthrough is confirmed.'
          },
          {
            title: 'Mt. Whitney Vehicle Removal',
            status: 'Waiting – low priority',
            notes: 'Notice was posted Wednesday; hold until the 72-hour clock expires, then move to vendor scheduling.'
          },
          {
            title: 'SMS Channel for Ops',
            status: 'Choose platform',
            notes: 'Decide on shared phone, Google Voice, or Twilio so Elliot can text Jon & Melissa directly.'
          }
        ]
      },
      {
        owner: 'Elliot Projects',
        role: 'Systems + comms',
        highlight: true,
        tasks: [
          {
            title: 'Mt. Whitney Vehicle Removal Plan',
            status: 'Ready',
            notes: 'Tow log, vendor list, and PD call script drafted. Waiting on Melissa timestamp to start the 72-hour clock.'
          },
          {
            title: 'Elizabeth Trip Details',
            status: 'Light follow-up',
            notes: 'Daily nudge for depart/return dates and which car we’re taking.'
          },
          {
            title: 'Stead Listing Call',
            status: 'To do',
            notes: 'Call for status update and capture any new contact info.'
          },
          {
            title: 'Damage Photos to Owner',
            status: 'Ready to send',
            notes: 'Package the latest set and email once you approve the narrative.'
          },
          {
            title: '760 Marsh – Furnace + Masonry',
            status: 'In progress',
            notes: 'Send furnace bid email and onboard the approved masonry vendor.'
          },
          {
            title: 'Ops System Buildout',
            status: 'Weekly ops hour',
            notes: 'Vendor DB, maintenance tracker, property folders, washer/dryer tracking.'
          },
          {
            title: 'Job Board & Comms',
            status: 'Live',
            notes: 'Maintain the GitHub Pages site and add SMS workflows once the platform is picked.'
          }
        ]
      }
    ];

    const board = document.getElementById('board');
    sections.forEach(section => {
      const wrapper = document.createElement('article');
      wrapper.className = section.highlight ? 'person highlight' : 'person';

      const header = document.createElement('div');
      header.className = 'person-header';
      header.innerHTML = `
        <h2>${section.owner}</h2>
        <span class="role">${section.role}</span>
      `;

      const grid = document.createElement('div');
      grid.className = 'card-grid';

      section.tasks.forEach(task => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="meta">
            <span class="pill">${task.status}</span>
          </div>
          <h3>${task.title}</h3>
          <p class="notes">${task.notes}</p>
        `;
        grid.appendChild(card);
      });

      wrapper.appendChild(header);
      wrapper.appendChild(grid);
      board.appendChild(wrapper);
    });
  </script>
</body>
</html>

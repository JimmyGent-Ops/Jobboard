<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Command Center · Jimmy Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #050714;
      --panel: rgba(15, 23, 42, 0.92);
      --card: rgba(15, 23, 42, 0.9);
      --border: rgba(94, 234, 212, 0.3);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #5eead4;
      --pill-bg: rgba(94, 234, 212, 0.25);
      --pill-text: #0d9488;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e1b4b 0%, #020617 55%);
      color: var(--text);
      display: flex;
    }
    .layout {
      display: flex;
      width: 100%;
    }
    .sidebar {
      width: clamp(220px, 22vw, 260px);
      background: rgba(7, 10, 28, 0.95);
      border-right: 1px solid rgba(94, 234, 212, 0.15);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: inset -1px 0 0 rgba(94, 234, 212, 0.12);
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .timestamp {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .tab-btn {
      border: 1px solid rgba(94, 234, 212, 0.15);
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s ease, border 0.2s ease;
    }
    .tab-btn.active {
      background: rgba(94, 234, 212, 0.18);
      border-color: rgba(94, 234, 212, 0.45);
      color: #0d9488;
      font-weight: 600;
    }
    .content {
      flex: 1;
      padding: clamp(20px, 3vw, 40px);
    }
    .tab-panel {
      display: none;
      animation: fade 0.25s ease;
    }
    .tab-panel.active {
      display: block;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    section.panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 25px 70px rgba(2, 6, 23, 0.55);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    section.panel h2 {
      margin: 0;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(94, 234, 212, 0.12);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card h3 {
      margin: 0;
      font-size: 1rem;
    }
    .pill {
      align-self: flex-start;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--pill-bg);
      color: var(--pill-text);
    }
    .pill.warning {
      background: rgba(248, 113, 113, 0.25);
      color: var(--danger);
    }
    .alert-pill {
      margin-left: auto;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(248, 113, 113, 0.2);
      color: var(--danger);
      display: none;
    }
    .meta {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .notes {
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .person-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 25px 70px rgba(2, 6, 23, 0.45);
    }
    .person-panel h2 {
      margin: 0 0 12px;
    }
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }
      .layout {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
      }
      .logo, .timestamp {
        width: 100%;
      }
      .tab-btn {
        flex: 1 1 calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Command Center</div>
      <div id="sidebar-timestamp" class="timestamp"></div>
      <button class="tab-btn active" data-tab="main">Overview</button>
      <button class="tab-btn" data-tab="rentals">Rentals</button>
      <button class="tab-btn" data-tab="jimmy">Jimmy + Elliot</button>
      <button class="tab-btn" data-tab="sandy">Sandy</button>
      <button class="tab-btn" data-tab="jon">Jon</button>
      <button class="tab-btn" data-tab="melissa">Melissa</button>
      <button class="tab-btn" data-tab="paul">Paul</button>
    </aside>

    <main class="content">
      <div id="tab-main" class="tab-panel active">
        <section class="panel">
          <h2>Command Overview</h2>
          <div class="grid">
            <div class="card" id="lead-summary"></div>
            <div class="card" id="rental-summary"></div>
            <div class="card" id="notice-summary"></div>
            <div class="card" id="vendor-summary"></div>
          </div>
        </section>

        <section class="panel" style="margin-top: 18px;">
          <h2>Rental Showings <span id="rental-alert" class="alert-pill"></span></h2>
          <div id="rental-showing-cards" class="card-grid"></div>
        </section>

        <div class="grid" style="margin-top: 18px;">
          <section class="panel">
            <h2>Leads & Listings</h2>
            <div id="lead-cards" class="card-grid"></div>
          </section>
          <section class="panel">
            <h2>Vacate / Notice Queue</h2>
            <div id="notice-cards" class="card-grid"></div>
          </section>
        </div>

        <div class="grid" style="margin-top: 18px;">
          <section class="panel">
            <h2>Vendor & Field Queue</h2>
            <div id="vendor-cards" class="card-grid"></div>
          </section>
          <section class="panel">
            <h2>Field Ops Today</h2>
            <div id="field-cards" class="card-grid"></div>
          </section>
        </div>

        <section class="panel" style="margin-top: 18px;">
          <h2>Reminders & Blocks</h2>
          <div id="reminder-cards" class="card-grid"></div>
        </section>

        <section class="panel" style="margin-top: 18px;">
          <h2>Ops Projects</h2>
          <div id="ops-cards" class="card-grid"></div>
        </section>
      </div>

      <div id="tab-rentals" class="tab-panel">
        <section class="panel">
          <h2>Rental Pipeline</h2>
          <div id="rental-tab-summary" class="card-grid"></div>
        </section>
        <section class="panel" style="margin-top: 18px;">
          <h2>Rental Showings</h2>
          <div id="rental-tab-cards" class="card-grid"></div>
        </section>
      </div>

      <div id="tab-jimmy" class="tab-panel">
        <div class="person-panel">
          <h2>Jimmy + Elliot Projects</h2>
          <div id="jimmy-cards" class="card-grid"></div>
        </div>
      </div>

      <div id="tab-sandy" class="tab-panel">
        <div class="person-panel">
          <h2>Sandy Queue</h2>
          <div id="sandy-cards" class="card-grid"></div>
        </div>
      </div>

      <div id="tab-jon" class="tab-panel">
        <div class="person-panel">
          <h2>Jon Queue</h2>
          <div id="jon-cards" class="card-grid"></div>
        </div>
      </div>

      <div id="tab-melissa" class="tab-panel">
        <div class="person-panel">
          <h2>Melissa Queue</h2>
          <div id="melissa-cards" class="card-grid"></div>
        </div>
      </div>

      <div id="tab-paul" class="tab-panel">
        <div class="person-panel">
          <h2>Paul Queue</h2>
          <div id="paul-cards" class="card-grid"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      leads: [
        { name: 'Connie Sutton', property: '8330 Halladale', status: '$399k / $395k / $385k net sheets', next: 'Deliver the three versions and capture pricing feedback.' },
        { name: 'Copperwood Listing', property: 'Copperwood, Reno', status: 'Live on MLS', next: 'Build the table display/open-house schedule, finish the Zillow tour + walkthrough video, and send showing instructions.' },
        { name: 'Mariner Cove Tenant', property: 'Mariner Cove', status: 'Application review', next: 'Pick tenant with Sandy once rent-ready walk clears.' }
      ],
      rentalShowings: [
        { lead: 'Eberardo Landeros', property: 'Mariner Cove', status: 'Awaiting approval', requested: 'Sat 3/15 · 10:00 AM', confirmed: '', owner: 'Jimmy', notes: 'Flexible, asked for earlier slot if possible.', needsApproval: true },
        { lead: 'Marlene Plascencia', property: 'Mariner Cove', status: 'Confirmed', requested: 'Sat 3/15 · 11:30 AM', confirmed: 'Sat 3/15 · 11:30 AM', owner: 'Melissa', notes: 'Reminder scheduled; wants application link after showing.', needsApproval: false },
        { lead: 'Justin Gettemeier', property: 'Mariner Cove', status: 'Need alternate', requested: 'Sun 3/16 afternoon', confirmed: '', owner: 'Jimmy', notes: 'Traveling Sunday; needs Tue window or open-house invite.', needsApproval: true }
      ],
      notices: [
        { property: '214 Red Oak', status: 'Draft ready', deadline: 'Move-out by Apr 30', next: 'Need tenant names + delivery method to send notice.' },
        { property: 'Additional 30-day notices', status: 'Needs list', deadline: 'Queue this week', next: 'Waiting on Sandy for any other addresses needing paperwork.' }
      ],
      vendors: [
        { vendor: 'American Leak Detection', property: '852 Roundhouse', status: '3/10 · 8:00 AM', next: 'Confirm Sandy was onsite + capture findings/repair callout.' },
        { vendor: 'Jet Plumbing', property: '7541 Cumberland', status: '3/9 · 12–2 PM', next: 'Need tenant access confirmation + tracker update.' },
        { vendor: 'Door rebuild – Paul', property: 'Groom project', status: 'Need measurement + bid', next: 'Paul to pick vendor, send bid, and pencil in Thursday install once pricing/materials approved.' }
      ],
      field: [
        { owner: 'Melissa', task: 'Mariner Cove rent-ready walk', status: 'Today', note: 'Bring cleaning supplies, verify detectors, cabinets, cleanliness.' },
        { owner: 'Jon', task: 'Largomarcino remote + keys', status: 'In progress', note: 'Program garage remote, cut/deliver keys so Melissa can shoot photos.' }
      ],
      reminders: [
        { item: 'Sawyer citation info', detail: 'Need issuing agency + citation number to contest/delay.' },
        { item: '4606 Neil exterior photos', detail: 'Waiting on Sandy to confirm it’s done and send the files for the archive.' },
        { item: 'Text channel for ops', detail: 'Wire up Twilio/shared line so Elliot can text Jimmy, Jon, Melissa.' },
        { item: 'Ops build hour', detail: 'Vendor DB, maintenance tracker, property folders, washer/dryer log.' }
      ],
      ops: [
        { title: 'Weekly Ops Hour – System Buildout', status: 'Calendar block', notes: 'Use the weekly hour for the vendor DB, maintenance tracker, property folders, and washer/dryer tracking.' },
        { title: 'Job Board & Comms', status: 'Live', notes: 'Maintain the GitHub Pages site and add SMS workflows once the platform is picked.' }
      ],
      jimmy: [
        { title: 'Groom Door – Get Paul’s bid', status: 'ASAP', notes: 'Have Paul send his measurement, vendor choice, bid, and tentative Thursday install window for approval.' },
        { title: 'Halladale Net Sheets', status: '$399k / 395k / 385k', notes: 'Deliver all three versions to Connie Sutton and log feedback.' },
        { title: '760 Marsh – Furnace + Masonry', status: 'Send bid + onboard vendor', notes: 'Send the furnace bid email and onboard the approved masonry vendor.' },
        { title: 'Mt. Whitney Tow Photos', status: 'Collect from Melissa', notes: 'Pull Melissa’s timestamp + photo set so the tow log can be filed.' },
        { title: 'Copperwood MLS', status: 'Live – marketing push', notes: 'Build the table display/open-house schedule, finish the Zillow tour + walkthrough video, and send showing instructions.' },
        { title: 'Sawyer Citation Info', status: 'Needed', notes: 'Send agency + citation number so the notice can be contested.' },
        { title: 'SMS Channel for Ops', status: 'Choose platform', notes: 'Confirm Twilio/shared line so Elliot can text field teams + you.' }
      ],
      sandy: [
        { title: 'American Leak Detection – 852 Roundhouse', status: '3/10 · 8 AM', notes: 'Be onsite, inform downstairs neighbor, report findings.' },
        { title: 'Jet Plumbing – 7541 Cumberland', status: '3/9 · 12–2 PM', notes: 'Lock tenant access window and text confirmation.' },
        { title: '4606 Neil Exterior Photos', status: 'Confirm/close', notes: 'Let Elliot know if the exterior/storage photos are done and where they’re saved.' },
        { title: 'Matterport vs. Zillow', status: 'Decision needed', notes: 'Review cost/downtime with Jimmy and decide whether to pause Matterport.' },
        { title: '30-day notice list', status: 'Outstanding', notes: 'Send any other addresses needing notices so paperwork can be queued.' }
      ],
      jon: [
        { title: 'Mt. Whitney VIN + photo log', status: 'Complete – organize', notes: 'Photos are in; drop them into the Drive folder named with the address + tenant once you have the files.' },
        { title: 'Largomarcino remote + keys', status: 'In progress', notes: 'Program remote, cut/deliver keys before Melissa’s photo run.' },
        { title: 'Help Dave move – 1025 Tyler', status: 'Friday', notes: 'Coordinate with Dave on Friday’s move assist (load list, timing, vehicle/tools).' }
      ],
      melissa: [
        { title: 'Mt. Whitney Tow Notice Posting', status: 'Complete – send files', notes: 'Posting is done; Jimmy still needs the timestamp + photo set from Melissa to lock the tow log.' },
        { title: '852 Roundhouse – Running Toilet', status: 'Scheduling', notes: 'Coordinate Fidelity warranty call, lock appointment, confirm tenant.' },
        { title: 'Mariner Cove Rent-Ready Walk', status: 'Today', notes: 'Bring supplies, verify detectors, cabinets, cleanliness, document issues.' },
        { title: '1025 Tyler – Help Dave move', status: 'Need schedule', notes: 'Coordinate with Dave for the 1025 Tyler move assist (timing, access, checklist).' }
      ],
      paul: [
        { title: 'Groom Door – Measure & Vendor pick', status: 'Schedule now', notes: 'Set Paul’s measurement visit ASAP so he can choose his preferred vendor and confirm scope.' },
        { title: 'Groom Door – Bid + Thu install', status: 'Pending bid', notes: 'Request his bid, confirm materials availability, and pencil in a Thursday install once you approve.' }
      ]
    };

    const timestamp = new Date().toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    });
    document.getElementById('sidebar-timestamp').textContent = `Updated ${timestamp}`;

    const leadSummary = document.getElementById('lead-summary');
    leadSummary.innerHTML = `
      <h3>Focus Leads</h3>
      <p class="notes">${state.leads.length} active: ${state.leads.map(l => l.name).join(', ')}.</p>
    `;
    const rentalSummary = document.getElementById('rental-summary');
    const rentalApprovals = state.rentalShowings.filter(show => show.needsApproval).length;
    rentalSummary.innerHTML = `
      <h3>Rental Showings</h3>
      <p class="notes">${state.rentalShowings.length} booked · ${rentalApprovals} need approvals.</p>
    `;
    const rentalAlert = document.getElementById('rental-alert');
    if (rentalApprovals > 0) {
      rentalAlert.style.display = 'inline-flex';
      rentalAlert.textContent = `${rentalApprovals} approval${rentalApprovals === 1 ? '' : 's'} needed`;
    } else {
      rentalAlert.style.display = 'none';
    }
    const rentalTabSummary = document.getElementById('rental-tab-summary');
    if (rentalTabSummary) {
      rentalTabSummary.innerHTML = `
        <div class="card">
          <div class="pill">Showings</div>
          <h3>${state.rentalShowings.length} scheduled</h3>
          <p class="notes">${rentalApprovals} awaiting approval.</p>
        </div>
        <div class="card">
          <div class="pill">Tracker</div>
          <h3>Rental Lead Sheet</h3>
          <p class="notes"><a href="https://docs.google.com/spreadsheets/d/1GpdpMtNbbm8M8gCMIw8NCOhtS9-owKb3pl2DpEIy7IQ/edit" target="_blank">Open sheet ↗</a></p>
        </div>
      `;
    }
    const noticeSummary = document.getElementById('notice-summary');
    noticeSummary.innerHTML = `
      <h3>Notice Queue</h3>
      <p class="notes">${state.notices.length} files. Next deadline: ${state.notices[0].deadline}.</p>
    `;
    const vendorSummary = document.getElementById('vendor-summary');
    vendorSummary.innerHTML = `
      <h3>Vendors</h3>
      <p class="notes">${state.vendors.length} active vendors. Groom door + Jet Plumbing need updates.</p>
    `;

    function renderCards(containerId, items, mapFn) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      items.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = mapFn(item);
        container.appendChild(card);
      });
    }

    renderCards('lead-cards', state.leads, lead => `
      <div class="pill">${lead.status}</div>
      <h3>${lead.name}</h3>
      <div class="meta">${lead.property}</div>
      <p class="notes">${lead.next}</p>
    `);

    const rentalCardTemplate = show => `
      <div class="pill ${show.needsApproval ? 'warning' : ''}">${show.status}</div>
      <h3>${show.lead}</h3>
      <div class="meta">${show.property} · Requested ${show.requested}</div>
      <p class="notes">${show.notes}</p>
      <div class="meta">Owner: ${show.owner}${show.confirmed ? ` · Confirmed ${show.confirmed}` : ' · Waiting on confirmation'}</div>
    `;

    renderCards('rental-showing-cards', state.rentalShowings, rentalCardTemplate);
    renderCards('rental-tab-cards', state.rentalShowings, rentalCardTemplate);

    renderCards('notice-cards', state.notices, notice => `
      <div class="pill">${notice.status}</div>
      <h3>${notice.property}</h3>
      <div class="meta">${notice.deadline}</div>
      <p class="notes">${notice.next}</p>
    `);

    renderCards('vendor-cards', state.vendors, vendor => `
      <div class="pill">${vendor.status}</div>
      <h3>${vendor.vendor}</h3>
      <div class="meta">${vendor.property}</div>
      <p class="notes">${vendor.next}</p>
    `);

    renderCards('field-cards', state.field, item => `
      <div class="pill">${item.status}</div>
      <h3>${item.task}</h3>
      <div class="meta">${item.owner}</div>
      <p class="notes">${item.note}</p>
    `);

    renderCards('reminder-cards', state.reminders, reminder => `
      <h3>${reminder.item}</h3>
      <p class="notes">${reminder.detail}</p>
    `);

    renderCards('ops-cards', state.ops, project => `
      <div class="pill">${project.status}</div>
      <h3>${project.title}</h3>
      <p class="notes">${project.notes}</p>
    `);

    renderCards('jimmy-cards', state.jimmy, task => `
      <div class="pill">${task.status}</div>
      <h3>${task.title}</h3>
      <p class="notes">${task.notes}</p>
    `);

    renderCards('sandy-cards', state.sandy, task => `
      <div class="pill">${task.status}</div>
      <h3>${task.title}</h3>
      <p class="notes">${task.notes}</p>
    `);

    renderCards('jon-cards', state.jon, task => `
      <div class="pill">${task.status}</div>
      <h3>${task.title}</h3>
      <p class="notes">${task.notes}</p>
    `);

    renderCards('melissa-cards', state.melissa, task => `
      <div class="pill">${task.status}</div>
      <h3>${task.title}</h3>
      <p class="notes">${task.notes}</p>
    `);

    renderCards('paul-cards', state.paul, task => `
      <div class="pill">${task.status}</div>
      <h3>${task.title}</h3>
      <p class="notes">${task.notes}</p>
    `);

    const buttons = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    function activateTab(tab) {
      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      panels.forEach(panel => panel.classList.toggle('active', panel.id === `tab-${tab}`));
    }

    buttons.forEach(btn => btn.addEventListener('click', () => activateTab(btn.dataset.tab)));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jimmy Ops Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f4f6;
      --card: #fff;
      --text: #1f2933;
      --muted: #4b5563;
      --accent: #2563eb;
      --pill-bg: #e0e7ff;
      --pill-text: #1e3a8a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }
    .timestamp {
      color: var(--muted);
      font-size: 0.95rem;
    }
    #board {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .person {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    }
    .person.highlight {
      border: 2px solid var(--accent);
      box-shadow: 0 16px 45px rgba(37, 99, 235, 0.18);
    }
    .person-header {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .person-header h2 {
      margin: 0;
      font-size: 1.25rem;
    }
    .role {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.04);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .pill {
      background: var(--pill-bg);
      color: var(--pill-text);
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .notes {
      line-height: 1.4;
      font-size: 0.95rem;
    }
    footer {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ops Board · Thu, Mar 5</h1>
    <span class="timestamp">Updated 7:22 AM PT</span>
  </header>

  <section id="board"></section>

  <footer>
    View-only for now. Send updates via email/SMS and Elliot will refresh the board.
  </footer>

  <script>
    const sections = [
      {
        owner: 'Melissa',
        role: 'Field lead',
        tasks: [
          {
            title: 'Mt. Whitney Tow Notice Posting',
            status: 'Complete - archived',
            notes: 'Notice proof + timestamp filed; vehicle cleared 3/24 at 08:44 AM PT.'
          },
          {
            title: '852 Roundhouse – Running Toilet',
            status: 'Scheduling',
            notes: 'Work through Fidelity warranty line, lock the appointment, then confirm with the tenant.'
          }
        ]
      },
      {
        owner: 'Jon',
        role: 'Field tech',
        tasks: [
          {
            title: 'Mt. Whitney Vehicle Photos + VIN',
            status: 'Complete - archived',
            notes: 'Vehicle removed 3/24; VIN and photo set filed with tow receipt.'
          },
          {
            title: 'Groom Door – Pull & Deliver',
            status: 'Stand by',
            notes: 'Coordinate with Jimmy to remove the bad frame and drop it with the shop once measurements are locked.'
          }
        ]
      },
      {
        owner: 'Sandy',
        role: 'PM lead',
        tasks: [
          {
            title: 'American Leak Detection – 852 Roundhouse',
            status: 'Tue 3/10 · 8 AM',
            notes: 'Be onsite and keep the downstairs neighbor informed once the tech arrives.'
          },
          {
            title: 'Jet Plumbing – 7541 Cumberland',
            status: 'Mon 3/9 · 12–2 PM',
            notes: 'Confirm tenant access and text Elliot when the window is locked in.'
          },
          {
            title: 'Matterport vs Zillow',
            status: 'Decision needed',
            notes: 'Review cost + downtime with Jimmy and decide whether to pause Matterport until Zillow integration returns.'
          }
        ]
      },
      {
        owner: 'Jimmy',
        role: 'Director',
        tasks: [
          {
            title: 'Groom Door Vendor Call',
            status: 'Today',
            notes: 'Pick outside vendor vs. Jon/Jimmy rebuild so we can order the right frame + labor.'
          },
          {
            title: 'Sawyer Citation Info',
            status: 'Needed',
            notes: 'Send issuing agency + citation number so Elliot can contest/delay the ticket.'
          },
          {
            title: 'SMS Channel for Ops',
            status: 'Choose platform',
            notes: 'Decide on shared phone, Google Voice, or Twilio so Elliot can text Jon & Melissa directly.'
          }
        ]
      },
      {
        owner: 'Elliot Projects',
        role: 'Systems + comms',
        highlight: true,
        tasks: [
          {
            title: 'Mt. Whitney Vehicle Removal Plan',
            status: 'Complete - 3/24',
            notes: 'Tow executed 3/24 at 08:44 AM PT; tow log + PD call recorded and archived.'
          },
          {
            title: 'Elizabeth Trip Details',
            status: 'Light follow-up',
            notes: 'Daily nudge for depart/return dates and which car we’re taking.'
          },
          {
            title: 'Stead Listing Call',
            status: 'To do',
            notes: 'Call for status update and capture any new contact info.'
          },
          {
            title: 'Damage Photos to Owner',
            status: 'Ready to send',
            notes: 'Package the latest set and email once you approve the narrative.'
          },
          {
            title: '760 Marsh – Furnace + Masonry',
            status: 'In progress',
            notes: 'Send furnace bid email and onboard the approved masonry vendor.'
          },
          {
            title: 'Ops System Buildout',
            status: 'Weekly ops hour',
            notes: 'Vendor DB, maintenance tracker, property folders, washer/dryer tracking.'
          },
          {
            title: 'Job Board & Comms',
            status: 'Live',
            notes: 'Maintain the GitHub Pages site and add SMS workflows once the platform is picked.'
          }
        ]
      }
    ];

    const board = document.getElementById('board');
    sections.forEach(section => {
      const wrapper = document.createElement('article');
      wrapper.className = section.highlight ? 'person highlight' : 'person';

      const header = document.createElement('div');
      header.className = 'person-header';
      header.innerHTML = `
        <h2>${section.owner}</h2>
        <span class="role">${section.role}</span>
      `;

      const grid = document.createElement('div');
      grid.className = 'card-grid';

      section.tasks.forEach(task => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="meta">
            <span class="pill">${task.status}</span>
          </div>
          <h3>${task.title}</h3>
          <p class="notes">${task.notes}</p>
        `;
        grid.appendChild(card);
      });

      wrapper.appendChild(header);
      wrapper.appendChild(grid);
      board.appendChild(wrapper);
    });
  </script>
</body>
</html>
